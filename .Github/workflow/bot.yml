name: Bot Ofertas WhatsApp

on:
  schedule:
    # Executa a cada 30 minutos
    - cron: '*/30 * * * *'
  
  # Permite executar manualmente pelo botão "Run workflow"
  workflow_dispatch:

jobs:
  enviar-oferta:
    runs-on: ubuntu-latest
    
    steps:
      # Passo 1: Baixa o código
      - name: 📥 Checkout do código
        uses: actions/checkout@v3
      
      # Passo 2: Instala Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      # Passo 3: Instala biblioteca requests
      - name: 📦 Instalar dependências
        run: pip install requests
      
      # Passo 4: Executa o bot
      - name: 🤖 Executar Bot
        run: python bot_ofertas.py
